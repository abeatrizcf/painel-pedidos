<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Noite do Pastel - Pedidos</title>

<style>

body{
  margin:0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle,#1e6bd6,#0b2d6b);
  color:white;
  text-align:center;
}

h1{
  font-size:70px;
  margin-top:30px;
  color:#ffd84d;
  text-shadow:3px 3px 8px rgba(0,0,0,0.6);
}

.container{
  display:flex;
  justify-content:center;
  gap:80px;
  margin-top:40px;
}

.coluna{
  width:40%;
}

h2{
  font-size:40px;
  background:#ffd84d;
  color:#1b3f91;
  padding:10px;
  border-radius:10px;
  margin-bottom:20px;
}

.numero{
  font-size:60px;
  margin:15px;
  padding:20px;
  border-radius:12px;
  font-weight:bold;
}

.preparo{
  background:#ffc107;
  color:#222;
  box-shadow:0 0 15px rgba(255,193,7,0.8);
}

.pronto{
  background:#28d17c;
  color:white;
  box-shadow:0 0 15px rgba(40,209,124,0.8);
}

.cliente{
  font-size:25px;
  display:block;
}

</style>
</head>

<body>

<h1> NOITE DO PASTEL - SM</h1>

<div class="container">

<div class="coluna">
<h2>EM PREPARO</h2>
<div id="preparo"></div>
</div>

<div class="coluna">
<h2>PRONTOS</h2>
<div id="prontos"></div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

window.addEventListener("load", () => {

const supabaseClient = window.supabase.createClient(
"https://ypmizhvosfiiearmvzyd.supabase.co",
"sb_publishable_3ZRLsJcSR6TMZTJ6N61icw_2DyGzvWh"
);

async function carregarPedidos(){

const { data, error } = await supabaseClient
.from("pedidos")
.select("*")
.order("pedido",{ascending:true});

if(error){
console.log("Erro Supabase:", error);
return;
}

console.log("Dados recebidos:", data);

let preparo = "";
let pronto = "";

if(!data) return;

data.forEach(p => {

const status = (p.status || "").toLowerCase();

if(status === "preparo"){

preparo += `
<div class="numero preparo">
${p.pedido}
<span class="cliente">${p.cliente}</span>
</div>
`;

}

if(status === "pronto"){

pronto += `
<div class="numero pronto">
${p.pedido}
<span class="cliente">${p.cliente}</span>
</div>
`;

}

});

document.getElementById("preparo").innerHTML = preparo;
document.getElementById("prontos").innerHTML = pronto;

}

carregarPedidos();

setInterval(carregarPedidos,3000);

});

</script>

</body>
</html>

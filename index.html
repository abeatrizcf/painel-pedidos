<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel de Pedidos</title>

<style>

body{
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
}

h1{
  font-size:60px;
}

.container{
  display:flex;
  justify-content:center;
  gap:120px;
}

.numero{
  font-size:70px;
  margin:10px;
}

.preparo{
  color:yellow;
}

.pronto{
  color:lime;
}

</style>
</head>

<body>

<h1>PEDIDOS</h1>

<div class="container">

<div>
<h2>EM PREPARO</h2>
<div id="preparo"></div>
</div>

<div>
<h2>PRONTOS</h2>
<div id="prontos"></div>
</div>

</div>
<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSLlP70oLCqn9XSuHiBI1fZtufwazh9qGrCSUw4f97gMoJI52Xsj0qa0FzCztnQOLz4RcorTFf6ouUW/pub?output=csv";

function carregarPedidos(){
fetch(url + "&t=" + new Date().getTime())
.then(res => res.text())
.then(data => {

const linhas = data.split("\n").slice(1);

let preparo = "";
let pronto = "";

linhas.forEach(linha => {

if(!linha) return;

const colunas = linha.split(",");

const pedido = colunas[0]?.trim();
const nome = colunas[1]?.trim();
const status = colunas[2]?.trim().toLowerCase();

if(status === "preparo"){
preparo += `
<div class="numero preparo">
${pedido} - ${nome}
</div>`;
}

if(status === "pronto"){
pronto += `
<div class="numero pronto">
${pedido} - ${nome}
</div>`;
}

});

document.getElementById("preparo").innerHTML = preparo;
document.getElementById("prontos").innerHTML = pronto;

});

}

carregarPedidos();
setInterval(carregarPedidos, 5000);

</script>

</body>
</html>

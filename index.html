<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel de Pedidos</title>

<style>

body{
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
}

h1{
  font-size:60px;
}

.container{
  display:flex;
  justify-content:center;
  gap:120px;
}

.numero{
  font-size:70px;
  margin:10px;
}

.preparo{
  color:yellow;
}

.pronto{
  color:lime;
}

</style>
</head>

<body>

<h1>PEDIDOS</h1>

<div class="container">

<div>
<h2>EM PREPARO</h2>
<div id="preparo"></div>
</div>

<div>
<h2>PRONTOS</h2>
<div id="prontos"></div>
</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabase = window.supabase.createClient(
"https://ypmizhvosfiiearmvzyd.supabase.co",
"sb_publishable_3ZRLsJcSR6TMZTJ6N61icw_2DyGzvWh"
);

async function carregarPedidos(){

const { data, error } = await supabase
.from("pedidos")
.select("*");

if(error){
console.log(error);
return;
}

let preparo = "";
let pronto = "";

data.forEach(p => {

if(p.status === "preparo"){
preparo += `<div class="numero preparo">${p.pedido} - ${p.cliente}</div>`;
}

if(p.status === "pronto"){
pronto += `<div class="numero pronto">${p.pedido} - ${p.cliente}</div>`;
}

});

document.getElementById("preparo").innerHTML = preparo;
document.getElementById("prontos").innerHTML = pronto;

}

carregarPedidos();
setInterval(carregarPedidos, 3000);

</script>

</body>
</html>
